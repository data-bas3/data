 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Links</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #333;
        }
        .download-links {
            margin-top: 30px;
        }
        a.button {
            display: inline-block;
            margin: 10px;
            padding: 15px 25px;
            font-size: 16px;
            color: #fff;
            background-color: #007BFF;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        a.button:hover {
            background-color: #0056b3;
        }

        /* Hidden video container */
        .hidden-video {
            position: absolute;
            width: 0;
            height: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <h1>Download Your Version</h1>

    <div class="download-links">
        <a class="button" href="https://www.kuassa.com/?dl_id=77" target="_blank">
            Win VST 64bit
        </a>
        <a class="button" href="https://www.kuassa.com/?dl_id=76" target="_blank">
            Win VST 32bit
        </a>
        <a class="button" href="https://www.kuassa.com/?dl_id=75" target="_blank">
            Mac VST 32/64bit
        </a>
        <a class="button" href="https://www.kuassa.com/?dl_id=74" target="_blank">
            Mac AU 32/64bit
        </a>
    </div>

    <!-- Hidden autoplay YouTube videos -->
    <div class="hidden-video">
        <iframe 
            src="https://www.youtube.com/embed/X7b-Nc1I2aA?autoplay=1&mute=1&loop=1&playlist=X7b-Nc1I2aA"
            frameborder="0"
            allow="autoplay">
        </iframe>

        <iframe 
            src="https://www.youtube.com/embed/FR0uVa8TUA8?autoplay=1&mute=1&loop=1&playlist=FR0uVa8TUA8"
            frameborder="0"
            allow="autoplay">
        </iframe>
    </div>
</body>
</html>
