    <script>
    (function(){
        function trackEvent(c,a,n){ if(window._paq) _paq.push(['trackEvent',c,a,n]); }

        
            document.getElementById('mac-btn').addEventListener('click', function(e) {
                e.preventDefault();

                trackEvent('Download', 'Windows', 'Download for Windows');
                window.open(this.href, '_blank');

            });

        // Product cards (random shuffle)
        const INSTRUMENTS = [{"title":"Wave Pads PRO","desc":"100 inspiring ambient pads and atmospheric soundscapes for instant creative flow.","url":"https://auditory-lab.com/wavepadspro.html","img":"https://auditory-lab.com/style/images/og-images/best-ambient-pads-vst-au-virtual-instrument.png","video":"FR0uVa8TUA8","tag":""},{"title":"Complete Kontakt Bundle","desc":"Everything you need for professional scoring and music production in one package.","url":"https://auditory-lab.com/CompleteKontakt.html","img":"https://auditory-lab.com/style/images/og-images/Complet-Kontakt-bundle-vst-plugins.png","video":"","tag":"BUNDLE"},{"title":"Studio Bass","desc":"Realistic Bass guitar library with multiple articulations and authentic playing techniques.","url":"https://auditory-lab.com/bassguitar.html","img":"https://auditory-lab.com/style/images/product-gui/studio-bass/best-bass-guitar-vst-instrument-software.png","video":"IUd7pw9cmtk","tag":""},{"title":"Wave Leads PRO","desc":"Iconic synth leads for live performance.","url":"https://auditory-lab.com/waveleadspro.html","img":"https://auditory-lab.com/style/images/product-gui/wave-leads/neo-soul-rnb-lead-synth-smooth-vintage-analog.png","video":"X7b-Nc1I2aA","tag":"NEW"},{"title":"Folk Accordion","desc":"Meticulously sampled Accordion plugin.","url":"https://auditory-lab.com/accordion.html","img":"https://auditory-lab.com/style/images/product-gui/accordion/accordion-vst-bandoneon-ethnic-accordion-harmonium-virtual-instrument.png","video":"","tag":""},{"title":"VST/AU Plugins Bundle","desc":"Complete plugin bundle for all your needs.","url":"https://auditory-lab.com/VST-AU-Plugins.html","img":"https://auditory-lab.com/style/images/og-images/complete-virtual-instruments-vst-au-plugins-bundle.png","video":"","tag":""},{"title":"Banjo V3","desc":"Professional Banjo virtual instrument.","url":"https://auditory-lab.com/Banjo.html","img":"https://auditory-lab.com/style/images/product-gui/banjo/virtual-banjo-vst-au-aax-plugin-bluegrass-country-folk-instrument-daw-software.png","video":"","tag":""},{"title":"African Percussion","desc":"West African percussion samples.","url":"https://auditory-lab.com/AfricanPercussion.html","img":"https://auditory-lab.com/style/images/product-gui/african-percussion/virtual-african-percussion-kit-plugin-vst-au-axx.png","video":"","tag":""},{"title":"Harmonica V2","desc":"Complete harmonica collection.","url":"https://auditory-lab.com/Harmonica.html","img":"https://auditory-lab.com/style/images/product-gui/harmonica/realistic-harmonica-sample-library.png","video":"","tag":""}];
        function shuffle(arr){ for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr; }
        function buildCards(){
            const grid=document.getElementById('productsGrid');
            grid.innerHTML=shuffle([...INSTRUMENTS]).map(item=>{
                if(item.video){
                    return `<div class="product-card" data-product-name="${item.title}">
                        <div class="video-container" data-product-name="${item.title}">
                            <iframe class="video-embed" src="https://www.youtube.com/embed/${item.video}?autoplay=1&mute=1&loop=1&playlist=${item.video}&controls=0&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&disablekb=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                            <div class="video-overlay"><i class="fas fa-play-circle play-icon"></i></div>
                            <span class="index-product-tag tag-VIDEO">VIDEO</span>
                        </div>
                        <div class="product-content"><h3 class="product-title">${item.title}</h3><p class="product-description">${item.desc}</p><div class="product-buttons"><a href="${item.url}" class="btn view-more-btn" target="_blank" data-product-name="${item.title}">View More</a></div></div>
                    </div>`;
                } else {
                    const tagHtml=item.tag?`<span class="index-product-tag tag-${item.tag}">${item.tag}</span>`:'';
                    return `<div class="product-card" data-product-name="${item.title}">
                        <div class="product-image-container"><div class="product-image" style="background-image:url('${item.img}')"></div>${tagHtml}</div>
                        <div class="product-content"><h3 class="product-title">${item.title}</h3><p class="product-description">${item.desc}</p><div class="product-buttons"><a href="${item.url}" class="btn view-more-btn" target="_blank" data-product-name="${item.title}">View More</a></div></div>
                    </div>`;
                }
            }).join('');
            grid.querySelectorAll('.video-overlay').forEach(ov=>{
                ov.addEventListener('click',function(e){
                    e.preventDefault();
                    trackEvent('Video Click','Play',this.closest('.product-card')?.dataset.productName||'unknown');
                    const iframe=this.closest('.video-container').querySelector('iframe');
                    if(!iframe)return;
                    const modal=document.createElement('div');
                    modal.className='video-modal';
                    modal.innerHTML=`<div class="video-modal-content"><iframe class="video-modal-iframe" src="${iframe.src}&autoplay=1" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe><button class="video-modal-close">&times;</button></div>`;
                    document.body.appendChild(modal);
                    modal.querySelector('.video-modal-close').addEventListener('click',()=>modal.remove());
                    modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
                });
            });
            grid.querySelectorAll('.view-more-btn').forEach(btn=>{
                btn.addEventListener('click',function(){ trackEvent('View More','Click',this.dataset.productName||'unknown'); });
            });
        }
        buildCards();
        window.addEventListener('beforeunload',function(){ trackEvent('Session','Page Closed',window.location.href); });
    })();
    </script>
